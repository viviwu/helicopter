syntax = "proto3";

package quote_proto;

// ============================================================================
// 行情数据（PUB 通道）
// ============================================================================

message MarketData {
    string symbol    = 1;  // e.g. "BTC-USDT"
    double price     = 2;
    double volume    = 3;
    int64  timestamp = 4;  // Unix 毫秒
}

// ============================================================================
// 通知（PUB 通道，服务端广播）
// ============================================================================

message Notice {
    string content    = 1;
    int64  timestamp  = 2;
    uint64 message_id = 3;  // 去重 ID
}
