syntax = "proto3";

package trade_proto;

// ============================================================================
// 账户
// ============================================================================

message AccountInfo {
    uint64 user_id = 1;
    string username = 2;
    string email    = 3;
    string role     = 4;
}

// ============================================================================
// 登录
// ============================================================================

message LoginRequest {
    uint64 request_id = 1;
    string username   = 2;
    string password   = 3;
}

message LoginResponse {
    uint64 request_id   = 1;
    int32  error_code   = 2;
    string error_msg    = 3;
    AccountInfo account = 4;
}

// ============================================================================
// 下单
// ============================================================================

message PlaceOrderRequest {
    uint64 request_id = 1;
    string symbol     = 2;   // e.g. "BTC-USDT"
    int32  side       = 3;   // 1=buy, 2=sell
    int32  order_type = 4;   // 1=limit, 2=market
    double price      = 5;
    double quantity   = 6;
}

message PlaceOrderResponse {
    uint64 request_id = 1;
    int32  error_code = 2;
    string error_msg  = 3;
    uint64 order_id   = 4;   // server-assigned
}

// ============================================================================
// 查询订单
// ============================================================================

message QueryOrderRequest {
    uint64 request_id = 1;
    uint64 order_id   = 2;
}

message QueryOrderResponse {
    uint64 request_id  = 1;
    int32  error_code  = 2;
    string error_msg   = 3;
    uint64 order_id    = 4;
    string symbol      = 5;
    int32  status      = 6;  // 0=pending, 1=filled, 2=cancelled
    double filled_qty  = 7;
    double avg_price   = 8;
}

// ============================================================================
// 撤单
// ============================================================================

message CancelOrderRequest {
    uint64 request_id = 1;
    uint64 order_id   = 2;
}

message CancelOrderResponse {
    uint64 request_id = 1;
    int32  error_code = 2;
    string error_msg  = 3;
}
