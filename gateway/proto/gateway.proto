syntax = "proto3";

package gateway_proto;

// 登录请求
message LoginRequest {
    uint64 request_id = 1;
    string username   = 2;
    string password   = 3;
}

// 账户信息
message AccountInfo {
    uint64 user_id = 1;
    string username = 2;
    string email    = 3;
    string role     = 4;   // e.g. "admin", "user"
}

// 登录响应
message LoginResponse {
    uint64 request_id   = 1;
    int32  error_code   = 2;  // 0=成功, >0=各类业务错误
    string error_msg    = 3;  // 错误描述或成功提示
    AccountInfo account = 4;
}