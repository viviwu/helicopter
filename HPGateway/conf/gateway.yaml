# HPGateway Configuration
gateway:
  # Trade 通道监听
  trade_bind_ip: "0.0.0.0"
  trade_port: 8001

  # Quote 通道监听
  quote_bind_ip: "0.0.0.0"
  quote_port: 8002

  # IO 线程数（one loop per thread）
  io_thread_num: 4

  # 业务线程数
  worker_thread_num: 4

  # 最大连接数
  max_connections: 10000

  # 心跳超时（秒）
  heartbeat_timeout: 60

  # 日志级别: trace, debug, info, warn, error, fatal
  log_level: "info"
